_postgres_release: "18"

_service:
  "18": postgresql-18.service
  "17": postgresql-17.service
  "16": postgresql-16.service

_rpm_key:
  "18":
    - key: http://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL
      fingerprint: D4BF08AE67A0B4C7A1DBCCD240BCA2B408B40D20
      state: present
  "17":
    - key: http://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL
      fingerprint: D4BF08AE67A0B4C7A1DBCCD240BCA2B408B40D20
      state: present
  "16":
    - key: http://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL
      fingerprint: D4BF08AE67A0B4C7A1DBCCD240BCA2B408B40D20
      state: present

_yum_repository:
  "18":
    - file: pgdg-redhat-all
      name: pgdg18
      description: PostgreSQL 18 for RHEL / Rocky / CentOS 8 Stream - $basearch
      baseurl: http://download.postgresql.org/pub/repos/yum/18/redhat/rhel-8-$basearch
      enabled: true
      priority: "2"
      module_hotfixes: true
      gpgcheck: true
      gpgkey: http://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL
      state: present
  "17":
    - file: pgdg-redhat-all
      name: pgdg17
      description: PostgreSQL 17 for RHEL / Rocky / CentOS 8 Stream - $basearch
      baseurl: http://download.postgresql.org/pub/repos/yum/17/redhat/rhel-8-$basearch
      enabled: true
      priority: "2"
      module_hotfixes: true
      gpgcheck: true
      gpgkey: http://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL
      state: present
  "16":
    - file: pgdg-redhat-all
      name: pgdg16
      description: PostgreSQL 16 for RHEL / Rocky / CentOS 8 Stream - $basearch
      baseurl: http://download.postgresql.org/pub/repos/yum/16/redhat/rhel-8-$basearch
      enabled: true
      priority: "2"
      module_hotfixes: true
      gpgcheck: true
      gpgkey: http://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL
      state: present

_yum:
  "18":
    - { state: latest, name: nss_wrapper }
    - { state: present, name: "postgresql18-server-{{ postgres_version }}*" }
  "17":
    - { state: latest, name: nss_wrapper }
    - { state: present, name: "postgresql17-server-{{ postgres_version }}*" }
  "16":
    - { state: latest, name: nss_wrapper }
    - { state: present, name: "postgresql16-server-{{ postgres_version }}*" }
