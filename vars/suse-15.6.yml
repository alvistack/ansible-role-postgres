_postgres_release: "18"

_service: "{{ __service[postgres_release] }}"
__service:
  "18": postgresql.service
  "17": postgresql.service
  "16": postgresql.service

_rpm_key: "{{ __rpm_key[postgres_release] }}"
__rpm_key:
  "18":
    - key: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6/repodata/repomd.xml.key
      fingerprint: 116EB86331583E47E63CDF4D562111AC05905EA8
      state: present
  "17":
    - key: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6/repodata/repomd.xml.key
      fingerprint: 116EB86331583E47E63CDF4D562111AC05905EA8
      state: present
  "16":
    - key: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6/repodata/repomd.xml.key
      fingerprint: 116EB86331583E47E63CDF4D562111AC05905EA8
      state: present

_yum_repository: "{{ __yum_repository[postgres_release] }}"
__yum_repository:
  "18":
    - file: server_database_postgresql
      name: server_database_postgresql
      description: PostgreSQL and related packages (15.6)
      baseurl: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6
      enabled: true
      priority: "2"
      module_hotfixes: true
      gpgcheck: true
      gpgkey: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6/repodata/repomd.xml.key
      state: present
  "17":
    - file: server_database_postgresql
      name: server_database_postgresql
      description: PostgreSQL and related packages (15.6)
      baseurl: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6
      enabled: true
      priority: "2"
      module_hotfixes: true
      gpgcheck: true
      gpgkey: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6/repodata/repomd.xml.key
      state: present
  "16":
    - file: server_database_postgresql
      name: server_database_postgresql
      description: PostgreSQL and related packages (15.6)
      baseurl: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6
      enabled: true
      priority: "2"
      module_hotfixes: true
      gpgcheck: true
      gpgkey: http://downloadcontent.opensuse.org/repositories/server:/database:/postgresql/15.6/repodata/repomd.xml.key
      state: present

_zypper: "{{ __zypper[postgres_release] }}"
__zypper:
  "18":
    - { state: latest, name: nss_wrapper }
    - { state: present, name: "postgresql18-server-{{ postgres_version }}" }
  "17":
    - { state: latest, name: nss_wrapper }
    - { state: present, name: "postgresql17-server-{{ postgres_version }}" }
  "16":
    - { state: latest, name: nss_wrapper }
    - { state: present, name: "postgresql16-server-{{ postgres_version }}" }
